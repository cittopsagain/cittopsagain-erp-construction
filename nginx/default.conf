server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html;

    absolute_redirect off;

    # Example: Accessing the app via a subfolder (e.g., /erp)
    # You can change /erp to anything else, or even use / for root access.
    # If you change this, also update BASE_URL in www/config.php.
    location /erp {
        alias /var/www/html;
        index index.php index.html;
        try_files $uri $uri/ /erp/index.php?$query_string;

        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # If you want to access the app directly via domain name (root), 
    # uncomment the following block and comment out the location /erp block above.
    # Also set BASE_URL to '/' in www/config.php.
    #
    # location / {
    #    root /var/www/html;
    #    index index.php index.html;
    #    try_files $uri $uri/ /index.php?$query_string;
    #
    #    location ~ \.php$ {
    #        fastcgi_pass php:9000;
    #        fastcgi_index index.php;
    #        include fastcgi_params;
    #        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    #    }
    # }

    location / {
        return 301 /erp/;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
